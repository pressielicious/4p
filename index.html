<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>4P Tracker</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#5A0000;
  --primary-dark:#2A0000;
  --bg:#070707;
  --card:#141414;
  --text:#ffffff;
  --muted:#9a9a9a;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Inter,sans-serif;
  color:var(--text);
  min-height:100vh;

  background:
    radial-gradient(circle at top, rgba(90,0,0,0.35), transparent 60%),
    radial-gradient(circle at bottom, rgba(90,0,0,0.15), transparent 60%),
    var(--bg);
}

.container{
  max-width:900px;
  margin:auto;
  padding:16px;
}

/* HEADER */
.header{
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  padding:22px;
  border-radius:18px;
  margin-bottom:14px;
  box-shadow:0 10px 30px rgba(90,0,0,0.25);
  display:flex;
  justify-content:center;
  align-items:center;
}

.logo{
  width:120px;
  height:auto;
  object-fit:contain;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  margin-bottom:12px;
}

.card{
  background:var(--card);
  padding:16px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.05);
}

.label{
  font-size:12px;
  color:var(--muted);
}

.big{
  font-size:26px;
  font-weight:700;
  margin-top:6px;
}

/* SEARCH */
.search input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  outline:none;
  background:var(--card);
  color:white;
  margin-bottom:12px;
}

/* PLAYERS */
.players{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:10px;
}

.player{
  background:var(--card);
  padding:12px;
  border-radius:12px;
  border-left:4px solid #7A1111;
  transition:0.15s ease;
}

.player:hover{
  transform:translateY(-2px);
}

.name{
  font-weight:600;
  font-size:15px;
  word-break:break-word;
}

.id{
  margin-top:6px;
  display:inline-block;
  padding:5px 10px;
  background:rgba(90,0,0,0.25);
  border-radius:999px;
  font-size:12px;
  color:#ffb3b3;
}

.empty{
  text-align:center;
  color:var(--muted);
  padding:30px;
  grid-column:1 / -1;
}

.footer{
  text-align:center;
  margin-top:18px;
  color:#777;
  font-size:12px;
}

/* RESPONSIVE */
@media(max-width:900px){
  .grid{
    grid-template-columns:1fr;
  }

  .players{
    grid-template-columns:repeat(2,1fr);
  }
}

@media(max-width:600px){
  .players{
    grid-template-columns:1fr;
  }
  .logo{
    width:100px;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <img src="logo.png" class="logo" alt="Logo">
  </div>

  <div class="grid">
    <div class="card">
      <div class="label">Players Online</div>
      <div class="big" id="count">0</div>
    </div>

    <div class="card">
      <div class="label">Today Date</div>
      <div class="big" id="date">-</div>
    </div>

    <div class="card">
      <div class="label">Last Update</div>
      <div class="big" id="time">-</div>
    </div>
  </div>

  <div class="search">
    <input id="search" placeholder="Search player name..." />
  </div>

  <div class="players" id="players">
    <div class="empty">Loading...</div>
  </div>

  <div class="footer">
    Auto refresh every 5 seconds
  </div>

</div>

<script>
const API = "https://servers-frontend.fivem.net/api/servers/single/7y66bb";
let cache = [];

function getPlayers(data){
  return data?.Data?.players || data?.Data?.Players || [];
}

function render(players){
  const el = document.getElementById("players");

  if(!players.length){
    el.innerHTML = `<div class='empty'>No players online</div>`;
    return;
  }

  el.innerHTML = players.map(p => `
    <div class="player">
      <div class="name">${p.name}</div>
      <div class="id">ID: ${p.id ?? 'N/A'}</div>
    </div>
  `).join('');
}

async function load(){
  try{
    const res = await fetch(API, { cache: "no-store" });
    const data = await res.json();

    const playersRaw = getPlayers(data);

    const formatted = playersRaw
      .map(p => ({
        name: p.name || "Unknown",
        id: p.id ?? "N/A"
      }))
      .sort((a,b)=>a.name.localeCompare(b.name));

    cache = formatted;

    document.getElementById("count").innerText = formatted.length;
    document.getElementById("time").innerText = new Date().toLocaleTimeString();
    document.getElementById("date").innerText = new Date().toLocaleDateString('en-GB');

    render(formatted);

  }catch(e){
    console.error(e);
    document.getElementById("players").innerHTML =
      `<div class='empty'>Failed to load data</div>`;
  }
}

document.getElementById("search").addEventListener("input", e => {
  const val = e.target.value.toLowerCase();
  render(cache.filter(p => p.name.toLowerCase().includes(val)));
});

load();
setInterval(load, 5000);
</script>

</body>
</html>
