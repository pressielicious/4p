<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tag Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#5A0000;
  --primary-light:#7A1111;
  --primary-dark:#3A0000;
  --bg:#090909;
  --card:#141414;
  --text:#fff;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:Inter,sans-serif;
  background:
    radial-gradient(circle at top, rgba(120,0,0,.25), transparent 40%),
    radial-gradient(circle at bottom right, rgba(90,0,0,.18), transparent 35%),
    linear-gradient(180deg,#090909,#050505);
  color:#fff;
  min-height:100vh;
  padding:20px;
}
.container{max-width:1200px;margin:auto;}
.header{
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  padding:20px;
  border-radius:20px;
  text-align:center;
  margin-bottom:20px;
}
.logo{width:120px;max-width:100%;}
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}
.tag{
  text-decoration:none;
  background:rgba(20,20,20,.9);
  border:1px solid rgba(255,255,255,.05);
  border-left:4px solid var(--primary-light);
  border-radius:16px;
  padding:22px;
  color:#fff;
  text-align:center;
  font-size:20px;
  font-weight:700;
  transition:.15s ease;
}
.tag:hover{
  transform:translateY(-3px);
  background:rgba(30,30,30,.95);
}
@media(max-width:900px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:700px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <img src="logo.png" class="logo" alt="Logo">
  </div>

  <div class="grid" id="tags"></div>
</div>

<script>
const tags = [
'D7','TLW','KGE','4P','BMS','DRM','HST','69D','302','KPK','KAP','DVX','TTS','BLG','CBR','WAR','MDS','HLG','TRL','PDAB'
];

document.getElementById('tags').innerHTML = tags.map(tag =>
`<a class="tag" href="tracker.html?tag=${tag}">${tag}</a>`
).join('');
</script>
</body>
</html>
